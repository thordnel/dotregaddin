:4px;line-height:1.4">Use this if you are still transitioning from older or physical class records.</p></div><div class="future-settings"></div><button id="submit-gradesheet" class="ms-Button ms-Button--hero" style="width:100%"><span class="ms-Button-label">Submit Gradesheet</span></button></div><div id="status-message" class="ms-fontSize-s" style="margin-top:15px;height:20px;color:#0078d4;text-align:center;font-weight:400"></div><hr style="border:0;border-top:1px solid #f3f2f1;margin:25px 0"><div class="section footer" style="text-align:center;padding-bottom:20px"><button id="disconnect-button" class="ms-Button" style="width:100%;border-color:#a4262c"><span class="ms-Button-label" style="color:#a4262c">Disconnect Account</span></button><p class="ms-fontSize-xs" style="color:#605e5c;margin-top:10px;font-style:italic">Use class record without connection to the registrar.</p></div></div><div id="auth-overlay" class="auth-overlay"><div id="auth-panel" class="auth-panel"><div class="panel-header"><span class="ms-fontWeight-semibold">Authentication Required</span> <button id="close-panel" style="background:0 0;border:none;cursor:pointer;font-size:22px">&times;</button></div><div class="panel-body"><p class="ms-fontSize-s" style="margin-bottom:20px">Please enter your password to submit grades to the Registrar.</p><input type="password" id="panel-pass" class="input" placeholder="Password"> <button id="confirm-submit" class="ms-Button ms-Button--hero"><span class="ms-Button-label">Verify & Submit</span></button></div></div></div><script src="7a6867089ad2622f2df4.js"></script></body></html>
