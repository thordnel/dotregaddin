<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Login to DOT.REG</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>
</head>
<body class="ms-font-m ms-welcome">
    <main class="ms-welcome__main">
        <h2 class="ms-font-xl">Login Required</h2>
        <div class="ms-TextField">
            <input type="text" id="username" class="ms-TextField-field" placeholder="Username">
        </div>
        <div class="ms-TextField">
            <input type="password" id="password" class="ms-TextField-field" placeholder="Password">
        </div>
        <button id="login-button" class="ms-Button ms-Button--primary">
            <span class="ms-Button-label">Sign In</span>
        </button>
    </main>
</body>
</html>
