<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to DOT.REG</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="../common/syncEngine.js"></script>
    <script src="login.js"></script>
    
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>
    <link rel="stylesheet" href="login.css">    
</head>

<body class="ms-Fabric">

<div class="container">
    
    <header class="header">
        <img src="../../assets/logo-filled.png" alt="DOT.REG Logo" />
        <h1>DOT.REG Portal</h1>
        <p class="subtitle">Connect to your School Registrar</p>
    </header>

    <div class="section">
        <label for="server-url">Registrar Address</label>
        <input type="text" id="server-url"
               placeholder="example.registrar.com"
               value="macdemo.tesdadvts.org">

        <div class="button-row">
            <button id="connect-button" class="ms-Button ms-Button--primary full-width">
                <span class="ms-Button-label" id="connect-label">Connect</span>
            </button>

            <button id="save-settings-button" class="ms-Button" disabled title="Save address">
                <i class="ms-Icon ms-Icon--Save"></i>
            </button>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #edebe9; margin: 8px 0;" />

    <div class="section disabled" id="credentials-section">
        <div class="section">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" disabled>
        </div>

        <div class="section">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" disabled>
        </div>

        <button id="login-button" class="ms-Button ms-Button--primary full-width" style="margin-top: 8px;">
            <span class="ms-Button-label">Sync Class Record</span>
        </button>
    </div>
<div id="progress-container" style="display: none; margin-bottom: -4px;"> 
    <div class="ms-ProgressIndicator">
        <div class="ms-ProgressIndicator-itemProgress" style="height: 4px;">
            <div id="progress-bar-width" class="ms-ProgressIndicator-progressBar" style="width: 0%; height: 4px; background-color: #0078d4; transition: width 0.3s ease;"></div>
        </div>
        <div id="progress-percentage" class="ms-ProgressIndicator-itemDescription" style="text-align: right; font-size: 10px; margin-top: 0px; padding-top: 2px;">0%</div>
    </div>
</div>
<div id="status-message" style="margin-top: 0px; padding-top: 0px; font-size: 11px; min-height: 14px;"></div>

</body>
</html>
